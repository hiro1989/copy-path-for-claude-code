schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform
context: |
  Too much of a good thing is bad. Keep all output short and to the point.

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
rules:
  proposal:
    - After creating or updating the proposal, commit it before proceeding to the next artifact.
    - If `.openspec.yaml` is uncommitted at this point, include it in the same commit as the proposal.
    - After committing the proposal, repeat the following cycle up to 2 times. (1) run the `sdd-proposal-reviewer` agent with proposal_path, (2) if overall_verdict is FAIL, fix all action_items and commit. After 2 cycles, report any remaining unfixed items to the user before proceeding.
  design:
    - After creating or updating the design, commit it before proceeding to the next artifact.
    - After committing the design, repeat the following cycle up to 2 times. (1) run the `sdd-design-reviewer` agent with design_path, (2) if overall_verdict is FAIL, fix all action_items and commit. After 2 cycles, report any remaining unfixed items to the user before proceeding.
  specs:
    - After creating or updating the specs, commit them before proceeding to the next artifact.
    - After committing the specs, repeat the following cycle up to 2 times. (1) run the `sdd-delta-specs-reviewer` agent with spec_path, (2) if overall_verdict is FAIL, fix all action_items and commit. After 2 cycles, report any remaining unfixed items to the user before proceeding.
  tasks:
    - After creating or updating the tasks, commit them before proceeding to the next artifact.
    - "TDD is mandatory: always plan tasks in test-first order. For each feature or behavior, the test task MUST come before its implementation task."
    - "Recommended TDD cycle per feature: (1) create stub functions with function name, JSDoc, and input or output types but no logic, (2) write tests against the stubs, (3) implement the real logic to make the tests pass."
    - "Task ordering pattern: stub definitions, then tests, then implementation, then next feature's stubs, tests, implementation, and so on."
    - Add a final task titled "Update the related section in README.md".
    - After committing the tasks, repeat the following cycle up to 2 times. (1) run the `sdd-tasks-reviewer` agent with tasks_path, (2) if overall_verdict is FAIL, fix all action_items and commit. After 2 cycles, report any remaining unfixed items to the user before proceeding.
    - After all tasks are implemented and committed, run the `openspec-verify-change` skill via a subagent to verify the implementation matches the change artifacts. Report the result to the user.
